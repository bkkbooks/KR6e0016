body:
  text: 華嚴七處九會頌釋章序昔者圭峯禪師有華嚴綸貫之作其書亡逸而不傳復菴綸貫本為禪者作故雖痛快直捷而不便於學教之士甞欲倣法華綸貫別作一書愧無旭師之筆而止客冬於華頂入信精舍得七處九會頌釋乃清涼觀大師之所著也其書僅一萬三千餘言較之疏鈔不及百之一而全經要義揭示殆盡且其文平易明白雖初學可解實為入華嚴教海之津梁矣此固非復菴之所能辦假使旭師見之未必不歎其不可及也於是再四校訂亟付之梓以廣其傳大抵喜簡厭繁人之恒情也則斯書流通宜先疏鈔而待今乃行嗚呼物之顯晦信有時哉原本寶永甲申昇堂所寫其人好古甞校梵網石壁疏等行之世云文化二年乙丑五月望沙門典壽謹撰
